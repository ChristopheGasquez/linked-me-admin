name: CI

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox

      - name: Lint
        if: github.base_ref == 'develop' || github.ref == 'refs/heads/develop'
        run: npx ng lint

      - name: Build
        if: github.base_ref == 'master' || github.ref == 'refs/heads/master'
        run: npx ng build
