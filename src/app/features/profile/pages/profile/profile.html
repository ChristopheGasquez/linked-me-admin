<ng-container *transloco="let t">
  <div class="profil">
    <section class="profil__section">
      <h2 class="profil__section__title">{{ t('me.profile.infoSection') }}</h2>
      <app-profile-info />
    </section>

    <section class="profil__section">
      <h2 class="profil__section__title">{{ t('me.profile.securitySection') }}</h2>
      <app-profile-security />
    </section>

    <section class="profil__section">
      <h2 class="profil__section__title">{{ t('me.sessions.title') }}</h2>
      <app-sessions-list />
    </section>
  </div>
</ng-container>
